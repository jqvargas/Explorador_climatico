# TimescaleDB - internal only (127.0.0.1, not exposed to internet)
services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: clima_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: clima1234
      POSTGRES_DB: clima
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clima"]
      interval: 5s
      timeout: 5s
      retries: 5
